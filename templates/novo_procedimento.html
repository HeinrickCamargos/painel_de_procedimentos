{% extends 'base.html' %}
{% block content %}
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">

<div class="container">
    <div class="setup-container-novo">
        <div class="text-center mb-5">
            <h2 class="fw-black text-dark">Registrar Procedimento</h2>
            <p class="text-muted">Preencha os detalhes da nova tarefa abaixo.</p>
        </div>

        <form method="POST" enctype="multipart/form-data" id="formProc">
            <div class="input-group-custom">
                <label>Título da Tarefa</label>
                <input type="text" name="titulo" placeholder="Ex: Backup de Servidor" required autofocus>
            </div>

            <div class="input-group-custom">
                <label>Setor Responsável</label>
                <input type="text" name="setor" placeholder="Ex: TI, RH, Financeiro..." required>
            </div>

            <div class="input-group-custom">
                <label>Descrição Detalhada (Cole imagens aqui)</label>
                <div id="editor"></div>
                <input type="hidden" name="descricao" id="descricao">
            </div>

            <div class="input-group-custom">
                <label>Anexar Documento (Opcional)</label>
                <input type="file" name="arquivo" class="form-control rounded-3">
            </div>

            <button type="submit" class="btn-create shadow-lg">Finalizar Registro</button>

            <div class="text-center mt-3">
                <a href="/bloco/{{ bloco_id }}" class="text-muted text-decoration-none small fw-bold">← Cancelar e
                    voltar</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
<script>
    var quill = new Quill('#editor', {
        theme: 'snow',
        placeholder: 'Descreva o passo a passo...',
        modules: {
            toolbar: [
                ['bold', 'italic', 'underline'],
                ['link', 'image'],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }]
            ]
        }
    });

    document.getElementById('formProc').onsubmit = function() {
        var descricao = document.querySelector('input[name=descricao]');
        descricao.value = quill.root.innerHTML;
    };
</script>
{% endblock %}
